<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit Converter</title>

  <link rel="stylesheet" href="index.css" />
</head>
<body>

  <div class="container">

    <div class="hero">
      <h1>Metric / Imperial Unit Conversion</h1>

      <input
        type="number"
        id="input-el"
        class="input"
        placeholder="0"
      />

      <button id="btn-convert" class="btn">
        Convert
      </button>
    </div>

    <div class="units">

      <div class="unit">
        <h2>Length (Meter / Feet)</h2>
        <p id="length-el"></p>
      </div>

      <div class="unit">
        <h2>Volume (Liters / Gallons)</h2>
        <p id="volume-el"></p>
      </div>

      <div class="unit">
        <h2>Mass (Kilograms / Pounds)</h2>
        <p id="mass-el"></p>
      </div>

    </div>

  </div>

  <script src="index.js"></script>
</body>
</html>
